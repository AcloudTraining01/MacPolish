name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project MacPolish.xcodeproj \
            -scheme MacPolish

      - name: Build archive
        run: |
          xcodebuild archive \
            -project MacPolish.xcodeproj \
            -scheme MacPolish \
            -configuration Release \
            -archivePath build/MacPolish.xcarchive \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            ARCHS="arm64 x86_64"

      - name: Export app
        run: |
          mkdir -p build/export
          cp -R "build/MacPolish.xcarchive/Products/Applications/MacPolish.app" build/export/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash Tools/make-dmg.sh

      - name: Build ZIP
        run: |
          cd build/export
          zip -r ../MacPolish-${{ github.ref_name }}.zip MacPolish.app
          cd ../..

      - name: Generate checksums
        run: |
          cd build
          shasum -a 256 MacPolish-${{ github.ref_name }}.dmg > SHA256SUMS.txt
          shasum -a 256 MacPolish-${{ github.ref_name }}.zip >> SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            build/MacPolish-${{ github.ref_name }}.dmg
            build/MacPolish-${{ github.ref_name }}.zip
            build/SHA256SUMS.txt
